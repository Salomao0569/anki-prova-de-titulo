<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Anki DIC — Ecocardiografia</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;padding:1.5rem 1rem;}

:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f0efe9;
  --color-text-primary:#1a1a1a;
  --color-text-secondary:#6b6b68;
  --color-text-tertiary:#9b9b98;
  --color-border-tertiary:rgba(0,0,0,0.12);
  --color-border-secondary:rgba(0,0,0,0.22);
  --border-radius-md:8px;
  --border-radius-lg:12px;
  --font-sans:system-ui,-apple-system,sans-serif;
}

@media(prefers-color-scheme:dark){
  :root{
    --color-background-primary:#1e1e1c;
    --color-background-secondary:#2a2a28;
    --color-text-primary:#f0efe9;
    --color-text-secondary:#a0a09c;
    --color-text-tertiary:#6b6b68;
    --color-border-tertiary:rgba(255,255,255,0.1);
    --color-border-secondary:rgba(255,255,255,0.18);
  }
  body{background:#141412;color:#f0efe9;}
}

.app{padding:1rem 0;max-width:700px;margin:0 auto;font-family:var(--font-sans);}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.topbar-title{font-size:12px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;}
.streak-badge{display:flex;align-items:center;gap:5px;background:var(--color-background-secondary);border-radius:99px;padding:4px 12px;font-size:13px;font-weight:500;color:var(--color-text-primary);}
.streak-fire{font-size:14px;}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.6rem .5rem;text-align:center;}
.stat-num{font-size:18px;font-weight:500;}
.stat-label{font-size:10px;color:var(--color-text-tertiary);margin-top:1px;}
.s-correct .stat-num{color:#1D9E75;}
.s-wrong .stat-num{color:#D85A30;}
.s-streak .stat-num{color:#BA7517;}

.pb-wrap{height:5px;background:var(--color-background-secondary);border-radius:99px;margin-bottom:1.25rem;overflow:hidden;}
.pb{height:100%;border-radius:99px;transition:width .4s ease;background:linear-gradient(90deg,#1D9E75,#5DCAA5);}

.diff-row{display:flex;gap:6px;align-items:center;margin-bottom:.75rem;}
.diff-label{font-size:11px;color:var(--color-text-tertiary);}
.diff-pip{width:8px;height:8px;border-radius:50%;background:var(--color-background-secondary);}
.diff-pip.on-easy{background:#1D9E75;}
.diff-pip.on-medium{background:#BA7517;}
.diff-pip.on-hard{background:#D85A30;}
.diff-text{font-size:11px;font-weight:500;}
.diff-text.easy{color:#1D9E75;}
.diff-text.medium{color:#BA7517;}
.diff-text.hard{color:#D85A30;}
.mode-badge{margin-left:auto;font-size:10px;padding:3px 8px;border-radius:99px;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);}

.card-wrap{margin-bottom:1rem;}
.card{width:100%;border-radius:var(--border-radius-lg);border:.5px solid var(--color-border-tertiary);background:var(--color-background-primary);padding:1.25rem;cursor:pointer;display:flex;flex-direction:column;min-height:200px;transition:box-shadow .2s;}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.face-back{display:none;}
.card-tag{font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem;}
.card-q{font-size:15px;font-weight:500;color:var(--color-text-primary);line-height:1.55;flex:1;}
.card-hint{font-size:11px;color:var(--color-text-tertiary);margin-top:.75rem;}
.answer-label{font-size:10px;font-weight:500;color:#1D9E75;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem;}
.answer-text{font-size:14px;color:var(--color-text-primary);line-height:1.6;flex:1;}
.answer-detail{font-size:12px;color:var(--color-text-secondary);margin-top:.65rem;padding-top:.65rem;border-top:.5px solid var(--color-border-tertiary);line-height:1.55;}

.diagram-wrap{margin:.65rem 0;border-radius:var(--border-radius-md);overflow:hidden;background:var(--color-background-secondary);padding:.75rem;}
.diagram-wrap svg{display:block;width:100%;height:auto;}

.quiz-card{border-radius:var(--border-radius-lg);border:.5px solid var(--color-border-tertiary);background:var(--color-background-primary);padding:1.25rem;margin-bottom:.75rem;}
.opts{display:flex;flex-direction:column;gap:7px;margin-bottom:.75rem;}
.opt{width:100%;text-align:left;padding:.65rem .9rem;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);background:var(--color-background-primary);font-size:13px;color:var(--color-text-primary);cursor:pointer;line-height:1.4;transition:background .12s;}
.opt:hover:not(:disabled){background:var(--color-background-secondary);}
.opt.c-correct{border-color:#1D9E75;background:#E1F5EE;color:#085041;}
.opt.c-wrong{border-color:#D85A30;background:#FAECE7;color:#4A1B0C;}
.opt:disabled{cursor:default;}
.opt-letter{font-weight:500;margin-right:7px;color:var(--color-text-tertiary);}
.opt.c-correct .opt-letter{color:#1D9E75;}
.opt.c-wrong .opt-letter{color:#D85A30;}

.fb{border-radius:var(--border-radius-md);padding:.65rem .9rem;font-size:12px;line-height:1.5;margin-bottom:.75rem;}
.fb.fb-ok{background:#E1F5EE;color:#085041;border:.5px solid #9FE1CB;}
.fb.fb-err{background:#FAECE7;color:#4A1B0C;border:.5px solid #F5C4B3;}
.fb-title{font-weight:500;margin-bottom:3px;}

.actions{display:flex;gap:8px;}
.btn{flex:1;padding:.6rem .9rem;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);background:transparent;font-size:13px;color:var(--color-text-primary);cursor:pointer;font-weight:500;transition:background .12s;}
.btn:hover{background:var(--color-background-secondary);}
.btn.primary{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary);}
.btn.primary:hover{opacity:.85;}
.btn.ok{border-color:#1D9E75;color:#1D9E75;}
.btn.ok:hover{background:#E1F5EE;}
.btn.err{border-color:#D85A30;color:#D85A30;}
.btn.err:hover{background:#FAECE7;}

.done{text-align:center;padding:2rem 1rem;}
.done-big{font-size:44px;margin-bottom:.75rem;}
.done-title{font-size:20px;font-weight:500;margin-bottom:.4rem;}
.done-sub{font-size:14px;color:var(--color-text-secondary);margin-bottom:1.25rem;line-height:1.5;}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const CARDS=[
  {id:1,tag:"Valvula tricuspide — cortes 2D",diff:"hard",
   question:"Em quais cortes a cuspide POSTERIOR da tricuspide e visualizada?",
   answer:"Bicaval modificado (ETE) e paraesternal via de entrada do VD posteriorizado",
   detail:"A cuspide posterior so aparece em cortes posteriorizados. No apical 4C padrao e subcostal convencional, veem-se apenas septal e anterior.",
   diagram:"tricuspide",
   options:["Apical 4C e subcostal 4C","Paraesternal eixo curto e subcostal 5C","Bicaval modificado (ETE) e paraesternal via de entrada VD posteriorizado","Apical 4C e paraesternal eixo longo VE"],correct:2},
  {id:2,tag:"Corte supraesternal",diff:"medium",
   question:"No corte supraesternal com index a 3h, qual estrutura e o numero 2?",
   answer:"Arteria pulmonar direita",
   detail:"Sequencia: 1=aorta transversa, 2=arteria pulmonar direita, 3=veia pulmonar superior direita, 4=veia pulmonar inferior esquerda.",
   diagram:"supraesternal",
   options:["Arteria pulmonar esquerda","Veia cava superior","Arteria pulmonar direita","Aorta ascendente"],correct:2},
  {id:3,tag:"Segmentacao do VE",diff:"medium",
   question:"Qual modelo e padrao para perfusao miocardica e por que?",
   answer:"17 segmentos — uniformiza com RNM e cintilografia. O 18 segmentos e usado para strain (GLS).",
   detail:"O apex (seg. 17) nao tem vascularizacao coronaria definida, por isso e incluido na contratilidade mas excluido da perfusao nos modelos de cintilografia.",
   diagram:"segmentacao",
   options:["16 segmentos — padrao historico ASE","17 segmentos — uniformiza com RNM e cintilografia","18 segmentos — maior precisao de strain","20 segmentos — mais detalhado"],correct:1},
  {id:4,tag:"Seio venoso coronario",diff:"hard",
   question:"Em quais janelas transtoracicas o seio venoso coronario e identificado?",
   answer:"Paraesternal eixo longo VE, apical 2 camaras e apical 4 camaras posteriorizado",
   detail:"O seio venoso drena no AD (nao AE). Passa no sulco AV posterior ao anel mitral. Quando dilatado (ex.: ablacao, CRTD), fica mais evidente.",
   diagram:"seio_venoso",
   options:["Apical 4C, subcostal e paraesternal eixo curto","Paraesternal eixo longo VE, apical 2C e apical 4C posteriorizado","Supraesternal, bicaval e subcostal 5C","Via de entrada VD, apical 3C e subcostal"],correct:1},
  {id:5,tag:"VCI — Pressao do AD",diff:"easy",
   question:"VCI=8mm ao final da expiracao, colapsabilidade >50%. PAD estimada e local de medicao?",
   answer:"PAD = 3 mmHg. Medir imediatamente abaixo da veia hepatica (0,5-3cm antes do AD)",
   detail:"Tabela: VCI<21+colapso>50% = 3mmHg; VCI<21+colapso<50% = 8mmHg; VCI>21+colapso>50% = 8mmHg; VCI>21+colapso<50% = 15mmHg.",
   diagram:"vci",
   options:["PAD=8mmHg, medir na desembocadura no AD","PAD=15mmHg, medir abaixo da veia hepatica","PAD=5mmHg, porcao distal da VCI","PAD=3mmHg, abaixo da veia hepatica"],correct:3},
  {id:6,tag:"FEVE — Foreshortening",diff:"medium",
   question:"O que acontece com a FEVE no Simpson quando ha foreshortening (apical trucado)?",
   answer:"Superestima — VDF calculado e menor (denominador menor), elevando artificialmente a FEVE",
   detail:"FEVE=(VDF-VSF)/VDF. Apical trucado -> VDF subestimado -> denominador menor -> FEVE maior que a real.",
   diagram:"feve",
   options:["Subestima — excursao apical reduzida","Nao interfere — Simpson e robusto","Superestima — VDF menor eleva artificialmente a FEVE","Subestima — VSF fica artificialmente elevado"],correct:2},
  {id:7,tag:"FEVE — Insuficiencia Mitral",diff:"medium",
   question:"Por que a FEVE superestima a funcao sistolica na IM importante?",
   answer:"O volume regurgitante e computado como parte do stroke volume total, inflando o numerador",
   detail:"SV total = SV real (VSVE) + Vol. Regurgitante. O VR 'escapa' para o AE durante a sistole mas e contado na FEVE como se fosse ejecao efetiva.",
   diagram:"feve",
   options:["Pos-carga reduzida aumenta VDF","Volume regurgitante infla o stroke volume total","IM subestima FEVE por reduzir enchimento","FEVE nao e afetada pela IM"],correct:1},
  {id:8,tag:"Parede anterior do VD",diff:"easy",
   question:"A parede ANTERIOR do VD e vista em quais planos?",
   answer:"Paraesternal via de entrada VD + paraesternal eixo curto (vasos da base) + paraesternal eixo longo VE",
   detail:"No apical 4C e subcostal ve-se a parede lateral/livre e septal. A parede anterior so aparece nos cortes paraesternais.",
   diagram:"vd",
   options:["Apical 4C, apical VD focado e subcostal","Paraesternal via de entrada VD, eixo curto vasos da base e eixo longo VE","Subcostal, supraesternal e apical 2C","Paraesternal eixo longo VE, apical 4C e subcostal"],correct:1},
  {id:9,tag:"Medidas da aorta",diff:"medium",
   question:"Em adultos, o anel aortico: quando medir e qual metodologia?",
   answer:"Mesossistole (antes da onda T) + inner-inner. As demais medidas da aorta: telediaastole + leading edge-leading edge.",
   detail:"Essa padronizacao vale para todas as faixas etarias. O anel na sistole porque a aorta esta maximamente aberta. Seios de Valsalva e alem: diastolico.",
   diagram:"aorta",
   options:["Telediastole, leading edge-leading edge","Mesossistole, leading edge-leading edge","Mesossistole, inner-inner","Telediastole, inner-inner"],correct:2},
  {id:10,tag:"Crista terminalis",diff:"easy",
   question:"O que e a crista terminalis e como diferencia-la da Valvula de Eustaquio e Rede de Chiari?",
   answer:"Proeminencia fibromuscular em C no AD (VCS->VCI pela parede lateral). Eustaquio: borda da VCI. Chiari: membranosa, fenestrada, associada a FOP.",
   detail:"A crista terminalis e uma estrutura solida, fibromuscular. Nao confundir com massas ou tumores — e uma variante normal e pode ser proeminente.",
   diagram:"ad",
   options:["Remanescente embriologico na borda da VCI","Membrana fenestrada associada a FOP","Proeminencia fibromuscular em C no AD da VCS ate VCI","Musculo papilar acessorio do VD"],correct:2}
];

const DIAGRAMS={
  tricuspide:(w,h)=>`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="${w/2}" cy="${h/2}" rx="${w*.38}" ry="${h*.38}" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
    <text x="${w/2}" y="${h*.18}" text-anchor="middle" font-size="10" fill="#1D9E75" font-weight="500">Valvula Tricuspide</text>
    <circle cx="${w*.32}" cy="${h*.38}" r="5" fill="#1D9E75"/>
    <text x="${w*.18}" y="${h*.34}" font-size="9" fill="#085041">Anterior</text>
    <circle cx="${w*.68}" cy="${h*.38}" r="5" fill="#BA7517"/>
    <text x="${w*.7}" y="${h*.34}" font-size="9" fill="#633806">Posterior</text>
    <circle cx="${w*.5}" cy="${h*.72}" r="5" fill="#534AB7"/>
    <text x="${w*.42}" y="${h*.85}" font-size="9" fill="#26215C">Septal</text>
    <line x1="${w*.32}" y1="${h*.38}" x2="${w*.5}" y2="${h*.72}" stroke="#ccc" stroke-width=".8"/>
    <line x1="${w*.68}" y1="${h*.38}" x2="${w*.5}" y2="${h*.72}" stroke="#ccc" stroke-width=".8"/>
    <text x="${w*.5}" y="${h*.97}" text-anchor="middle" font-size="8" fill="#888">Posterior -> cortes posteriorizados</text>
  </svg>`,
  supraesternal:(w,h)=>`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="${w*.5}" cy="${h*.42}" rx="${w*.3}" ry="${h*.22}" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/>
    <text x="${w*.5}" y="${h*.44}" text-anchor="middle" font-size="10" fill="#0C447C" font-weight="500">1 — Aorta</text>
    <ellipse cx="${w*.5}" cy="${h*.7}" rx="${w*.42}" ry="${h*.14}" fill="#FAECE7" stroke="#D85A30" stroke-width="1.5"/>
    <text x="${w*.5}" y="${h*.72}" text-anchor="middle" font-size="10" fill="#993C1D" font-weight="500">2 — A. Pulmonar Direita</text>
    <rect x="${w*.62}" y="${h*.3}" width="${w*.16}" height="${h*.18}" rx="4" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
    <text x="${w*.7}" y="${h*.41}" text-anchor="middle" font-size="8" fill="#085041">3-VPSD</text>
    <rect x="${w*.18}" y="${h*.5}" width="${w*.16}" height="${h*.18}" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
    <text x="${w*.26}" y="${h*.61}" text-anchor="middle" font-size="8" fill="#26215C">4-VPIE</text>
    <text x="${w*.5}" y="${h*.97}" text-anchor="middle" font-size="8" fill="#888">Index a 3h — ombro esquerdo</text>
  </svg>`,
  segmentacao:(w,h)=>`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <rect x="${w*.05}" y="${h*.08}" width="${w*.42}" height="${h*.78}" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
    <text x="${w*.26}" y="${h*.22}" text-anchor="middle" font-size="10" fill="#0C447C" font-weight="500">17 segmentos</text>
    <text x="${w*.26}" y="${h*.36}" text-anchor="middle" font-size="9" fill="#185FA5">Contratilidade</text>
    <text x="${w*.26}" y="${h*.48}" text-anchor="middle" font-size="9" fill="#185FA5">Perfusao miocardica</text>
    <text x="${w*.26}" y="${h*.6}" text-anchor="middle" font-size="9" fill="#185FA5">RNM + Cintilografia</text>
    <text x="${w*.26}" y="${h*.78}" text-anchor="middle" font-size="8" fill="#378ADD">padrao universal</text>
    <rect x="${w*.53}" y="${h*.08}" width="${w*.42}" height="${h*.78}" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
    <text x="${w*.74}" y="${h*.22}" text-anchor="middle" font-size="10" fill="#085041" font-weight="500">18 segmentos</text>
    <text x="${w*.74}" y="${h*.36}" text-anchor="middle" font-size="9" fill="#0F6E56">Strain (GLS)</text>
    <text x="${w*.74}" y="${h*.48}" text-anchor="middle" font-size="9" fill="#0F6E56">Softwares de</text>
    <text x="${w*.74}" y="${h*.58}" text-anchor="middle" font-size="9" fill="#0F6E56">deformacao</text>
    <text x="${w*.74}" y="${h*.78}" text-anchor="middle" font-size="8" fill="#1D9E75">AutoStrain / AFI</text>
  </svg>`,
  seio_venoso:(w,h)=>`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="${w*.38}" cy="${h*.45}" rx="${w*.28}" ry="${h*.35}" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
    <text x="${w*.38}" y="${h*.42}" text-anchor="middle" font-size="9" fill="#26215C">AE</text>
    <ellipse cx="${w*.62}" cy="${h*.45}" rx="${w*.22}" ry="${h*.28}" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/>
    <text x="${w*.62}" y="${h*.42}" text-anchor="middle" font-size="9" fill="#0C447C">AD</text>
    <path d="M${w*.18} ${h*.62} Q${w*.38} ${h*.78} ${w*.62} ${h*.65}" fill="none" stroke="#D85A30" stroke-width="2.5"/>
    <circle cx="${w*.62}" cy="${h*.65}" r="4" fill="#D85A30"/>
    <text x="${w*.5}" y="${h*.88}" text-anchor="middle" font-size="9" fill="#993C1D" font-weight="500">Seio Venoso -> drena no AD</text>
    <text x="${w*.5}" y="${h*.97}" text-anchor="middle" font-size="8" fill="#888">Sulco AV posterior ao anel mitral</text>
  </svg>`,
  vci:(w,h)=>`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <rect x="${w*.4}" y="${h*.05}" width="${w*.2}" height="${h*.3}" rx="4" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/>
    <text x="${w*.5}" y="${h*.22}" text-anchor="middle" font-size="9" fill="#0C447C">AD</text>
    <rect x="${w*.43}" y="${h*.35}" width="${w*.14}" height="${h*.55}" rx="3" fill="#FAECE7" stroke="#D85A30" stroke-width="1.5"/>
    <text x="${w*.5}" y="${h*.65}" text-anchor="middle" font-size="9" fill="#993C1D">VCI</text>
    <line x1="${w*.25}" y1="${h*.5}" x2="${w*.43}" y2="${h*.5}" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="3,2"/>
    <circle cx="${w*.43}" cy="${h*.5}" r="4" fill="#1D9E75"/>
    <text x="${w*.22}" y="${h*.46}" font-size="9" fill="#085041">V.Hepatica</text>
    <text x="${w*.5}" y="${h*.97}" text-anchor="middle" font-size="8" fill="#888">Medir abaixo da veia hepatica (0,5-3cm do AD)</text>
  </svg>`,
  feve:(w,h)=>`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <rect x="${w*.05}" y="${h*.08}" width="${w*.9}" height="${h*.32}" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
    <text x="${w*.5}" y="${h*.2}" text-anchor="middle" font-size="10" fill="#085041" font-weight="500">FEVE = (VDF - VSF) / VDF</text>
    <text x="${w*.5}" y="${h*.32}" text-anchor="middle" font-size="9" fill="#0F6E56">Numerador: Stroke Volume</text>
    <rect x="${w*.05}" y="${h*.48}" width="${w*.43}" height="${h*.38}" rx="5" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
    <text x="${w*.265}" y="${h*.62}" text-anchor="middle" font-size="9" fill="#993C1D" font-weight="500">Foreshortening</text>
    <text x="${w*.265}" y="${h*.73}" text-anchor="middle" font-size="8" fill="#993C1D">VDF menor -> FEVE maior</text>
    <text x="${w*.265}" y="${h*.82}" text-anchor="middle" font-size="8" fill="#D85A30">superestima</text>
    <rect x="${w*.52}" y="${h*.48}" width="${w*.43}" height="${h*.38}" rx="5" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
    <text x="${w*.735}" y="${h*.62}" text-anchor="middle" font-size="9" fill="#993C1D" font-weight="500">Insuf. Mitral</text>
    <text x="${w*.735}" y="${h*.73}" text-anchor="middle" font-size="8" fill="#993C1D">VR conta no SV -> FEVE maior</text>
    <text x="${w*.735}" y="${h*.82}" text-anchor="middle" font-size="8" fill="#D85A30">superestima</text>
  </svg>`,
  vd:(w,h)=>`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <text x="${w*.5}" y="${h*.1}" text-anchor="middle" font-size="10" fill="#888" font-weight="500">Parede Anterior do VD</text>
    <rect x="${w*.05}" y="${h*.18}" width="${w*.28}" height="${h*.28}" rx="4" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
    <text x="${w*.19}" y="${h*.3}" text-anchor="middle" font-size="8" fill="#085041">PEST via entrada</text>
    <text x="${w*.19}" y="${h*.4}" text-anchor="middle" font-size="8" fill="#1D9E75">Anterior</text>
    <rect x="${w*.37}" y="${h*.18}" width="${w*.28}" height="${h*.28}" rx="4" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
    <text x="${w*.51}" y="${h*.3}" text-anchor="middle" font-size="8" fill="#085041">PEST eixo curto</text>
    <text x="${w*.51}" y="${h*.4}" text-anchor="middle" font-size="8" fill="#1D9E75">Anterior</text>
    <rect x="${w*.69}" y="${h*.18}" width="${w*.27}" height="${h*.28}" rx="4" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
    <text x="${w*.825}" y="${h*.3}" text-anchor="middle" font-size="8" fill="#085041">PEST eixo longo</text>
    <text x="${w*.825}" y="${h*.4}" text-anchor="middle" font-size="8" fill="#1D9E75">Anterior</text>
    <rect x="${w*.2}" y="${h*.58}" width="${w*.28}" height="${h*.28}" rx="4" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
    <text x="${w*.34}" y="${h*.7}" text-anchor="middle" font-size="8" fill="#993C1D">Apical 4C</text>
    <text x="${w*.34}" y="${h*.8}" text-anchor="middle" font-size="8" fill="#D85A30">Lateral + Septal</text>
    <rect x="${w*.52}" y="${h*.58}" width="${w*.28}" height="${h*.28}" rx="4" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
    <text x="${w*.66}" y="${h*.7}" text-anchor="middle" font-size="8" fill="#993C1D">Subcostal</text>
    <text x="${w*.66}" y="${h*.8}" text-anchor="middle" font-size="8" fill="#D85A30">Lateral + Septal</text>
  </svg>`,
  aorta:(w,h)=>`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <rect x="${w*.05}" y="${h*.05}" width="${w*.43}" height="${h*.42}" rx="5" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
    <text x="${w*.265}" y="${h*.18}" text-anchor="middle" font-size="9" fill="#993C1D" font-weight="500">Anel Aortico</text>
    <text x="${w*.265}" y="${h*.3}" text-anchor="middle" font-size="8" fill="#D85A30">Mesossistole</text>
    <text x="${w*.265}" y="${h*.4}" text-anchor="middle" font-size="8" fill="#D85A30">Inner-Inner</text>
    <rect x="${w*.52}" y="${h*.05}" width="${w*.43}" height="${h*.42}" rx="5" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
    <text x="${w*.735}" y="${h*.18}" text-anchor="middle" font-size="9" fill="#085041" font-weight="500">Seios + JST + Asc.</text>
    <text x="${w*.735}" y="${h*.3}" text-anchor="middle" font-size="8" fill="#1D9E75">Telediastole</text>
    <text x="${w*.735}" y="${h*.4}" text-anchor="middle" font-size="8" fill="#1D9E75">Leading Edge-LE</text>
    <text x="${w*.5}" y="${h*.62}" text-anchor="middle" font-size="9" fill="#6b6b68">Indexar por ASC + genero + idade</text>
    <text x="${w*.5}" y="${h*.75}" text-anchor="middle" font-size="8" fill="#9b9b98">Evitar medidas absolutas em extremos de ASC</text>
  </svg>`,
  ad:(w,h)=>`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="${w*.5}" cy="${h*.48}" rx="${w*.38}" ry="${h*.4}" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/>
    <text x="${w*.5}" y="${h*.22}" text-anchor="middle" font-size="10" fill="#0C447C">Atrio Direito</text>
    <path d="M${w*.5} ${h*.1} Q${w*.85} ${h*.48} ${w*.5} ${h*.85}" fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-dasharray="4,2"/>
    <text x="${w*.78}" y="${h*.5}" text-anchor="middle" font-size="8" fill="#085041" font-weight="500">Crista</text>
    <text x="${w*.78}" y="${h*.6}" text-anchor="middle" font-size="8" fill="#085041">terminalis</text>
    <circle cx="${w*.5}" cy="${h*.82}" r="5" fill="#D85A30"/>
    <text x="${w*.5}" y="${h*.97}" text-anchor="middle" font-size="8" fill="#993C1D">VCI -> Eustaquio (borda)</text>
    <circle cx="${w*.5}" cy="${h*.12}" r="5" fill="#534AB7"/>
    <text x="${w*.5}" y="${h*.08}" text-anchor="middle" font-size="8" fill="#26215C">VCS</text>
  </svg>`
};

let mode='flip',idx=0,order=[...Array(CARDS.length).keys()],answered=false,selOpt=null,score={correct:0,wrong:0},streak=0,flipped=false,done=false;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
shuffle(order);
function card(){return CARDS[order[idx]];}
function diffInfo(d){
  if(d==='easy')return{label:'Facil',cls:'easy',pips:[1,0,0]};
  if(d==='medium')return{label:'Medio',cls:'medium',pips:[1,1,0]};
  return{label:'Dificil',cls:'hard',pips:[1,1,1]};
}
function makeDiagram(key){const W=320,H=100;const fn=DIAGRAMS[key];if(!fn)return'';return`<div class="diagram-wrap">${fn(W,H)}</div>`;}
function render(){
  const app=document.getElementById('app');
  if(done){renderDone(app);return;}
  app.innerHTML='';
  const c=card(),di=diffInfo(c.diff),pct=Math.round((idx/CARDS.length)*100);
  app.innerHTML+=`
    <div class="topbar">
      <span class="topbar-title">Anki DIC Eco</span>
      <div class="streak-badge"><span class="streak-fire">&#128293;</span>${streak} streak</div>
    </div>
    <div class="stats-row">
      <div class="stat s-correct"><div class="stat-num">${score.correct}</div><div class="stat-label">acertos</div></div>
      <div class="stat s-wrong"><div class="stat-num">${score.wrong}</div><div class="stat-label">erros</div></div>
      <div class="stat s-streak"><div class="stat-num">${streak}</div><div class="stat-label">seguidos</div></div>
      <div class="stat"><div class="stat-num">${CARDS.length-idx}</div><div class="stat-label">restantes</div></div>
    </div>
    <div class="pb-wrap"><div class="pb" style="width:${pct}%"></div></div>
    <div class="diff-row">
      ${di.pips.map(p=>`<div class="diff-pip ${p?'on-'+di.cls:''}"></div>`).join('')}
      <span class="diff-text ${di.cls}">${di.label}</span>
      <span class="mode-badge">${mode==='flip'?'Flip card':'Quiz DIC'}</span>
    </div>
  `;
  if(mode==='flip')renderFlip(app,c);else renderQuiz(app,c);
}
function renderFlip(app,c){
  const div=document.createElement('div');div.className='card-wrap';
  if(!flipped){
    div.innerHTML=`
      <div class="card" onclick="toggleFlip()">
        <div class="card-tag">${c.tag}</div>
        <div class="card-q">${c.question}</div>
        <div class="card-hint">Toque para revelar</div>
      </div>`;
  } else {
    div.innerHTML=`
      <div class="card" onclick="toggleFlip()">
        <div class="answer-label">Resposta</div>
        <div class="answer-text">${c.answer}</div>
        ${makeDiagram(c.diagram)}
        <div class="answer-detail">${c.detail}</div>
      </div>`;
  }
  app.appendChild(div);
  if(flipped){const act=document.createElement('div');act.className='actions';act.innerHTML=`<button class="btn err" onclick="markFlip(false)">Errei</button><button class="btn ok" onclick="markFlip(true)">Acertei</button>`;app.appendChild(act);}
}
function toggleFlip(){flipped=!flipped;render();}
function markFlip(ok){if(ok){score.correct++;streak++;}else{score.wrong++;streak=0;}flipped=false;advance();}
function renderQuiz(app,c){
  const qDiv=document.createElement('div');qDiv.className='quiz-card';
  qDiv.innerHTML=`<div class="card-tag">${c.tag}</div><div class="card-q">${c.question}</div>`;
  if(answered)qDiv.innerHTML+=makeDiagram(c.diagram);
  app.appendChild(qDiv);
  const opts=document.createElement('div');opts.className='opts';
  ['A','B','C','D'].forEach((l,i)=>{
    const btn=document.createElement('button');btn.className='opt';btn.disabled=answered;
    if(answered){if(i===c.correct)btn.classList.add('c-correct');else if(i===selOpt)btn.classList.add('c-wrong');}
    btn.innerHTML=`<span class="opt-letter">${l}.</span>${c.options[i]}`;
    if(!answered)btn.onclick=()=>selectOpt(i);
    opts.appendChild(btn);
  });
  app.appendChild(opts);
  if(answered){
    const ok=selOpt===c.correct;
    const fb=document.createElement('div');fb.className=`fb ${ok?'fb-ok':'fb-err'}`;
    fb.innerHTML=`<div class="fb-title">${ok?'Correto':'Incorreto'}</div>${c.detail}`;
    app.appendChild(fb);
    const act=document.createElement('div');act.className='actions';
    act.innerHTML=`<button class="btn primary" onclick="nextCard()">Proximo</button>`;
    app.appendChild(act);
  }
}
function selectOpt(i){const c=card();selOpt=i;answered=true;if(i===c.correct){score.correct++;streak++;}else{score.wrong++;streak=0;}render();}
function nextCard(){answered=false;selOpt=null;advance();}
function advance(){idx++;if(idx>=CARDS.length){done=true;render();return;}mode=idx%2===0?'flip':'quiz';render();}
function renderDone(app){
  const pct=Math.round((score.correct/CARDS.length)*100);
  const emoji=pct>=80?'&#127919;':pct>=60?'&#128200;':'&#128170;';
  const msg=pct>=80?'Muito bem! Pronto para o DIC.':pct>=60?'Bom progresso, continue!':'Revise e tente de novo.';
  app.innerHTML=`
    <div class="done">
      <div class="done-big">${emoji}</div>
      <div class="done-title">${msg}</div>
      <div class="done-sub">Voce acertou ${score.correct} de ${CARDS.length} cards (${pct}%)<br>Maior streak: ${streak} seguidos</div>
      <div class="stats-row" style="max-width:280px;margin:0 auto 1.25rem;">
        <div class="stat s-correct"><div class="stat-num">${score.correct}</div><div class="stat-label">acertos</div></div>
        <div class="stat s-wrong"><div class="stat-num">${score.wrong}</div><div class="stat-label">erros</div></div>
      </div>
      <div class="actions" style="max-width:320px;margin:0 auto;">
        <button class="btn primary" onclick="restart()">Refazer embaralhado</button>
      </div>
    </div>`;
}
function restart(){shuffle(order);idx=0;score={correct:0,wrong:0};streak=0;answered=false;selOpt=null;done=false;flipped=false;mode='flip';render();}
render();
</script>
</body>
</html>
