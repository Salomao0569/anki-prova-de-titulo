<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#141412"/>
<title>FlashMind — Anki DIC</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100dvh;-webkit-tap-highlight-color:transparent;}
:root{
  --bg1:#ffffff;--bg2:#f0efe9;--bg3:#e8e7e2;
  --tx1:#1a1a1a;--tx2:#6b6b68;--tx3:#9b9b98;
  --bd1:rgba(0,0,0,0.12);--bd2:rgba(0,0,0,0.22);
  --green:#1D9E75;--green-bg:#E1F5EE;--green-tx:#085041;
  --red:#D85A30;--red-bg:#FAECE7;--red-tx:#4A1B0C;
  --amber:#BA7517;--blue:#378ADD;--purple:#534AB7;
  --r:10px;--rl:14px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg1:#1e1e1c;--bg2:#2a2a28;--bg3:#333331;
    --tx1:#f0efe9;--tx2:#a0a09c;--tx3:#6b6b68;
    --bd1:rgba(255,255,255,0.1);--bd2:rgba(255,255,255,0.18);
    --green-bg:#0d3328;--green-tx:#5DCAA5;
    --red-bg:#3a1a0e;--red-tx:#F5A88A;
  }
  body{background:#141412;color:#f0efe9;}
}
.app{max-width:600px;margin:0 auto;padding:1.25rem 1.25rem 3rem;min-height:100dvh;}

/* Login */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80dvh;text-align:center;padding:2rem;}
.login-logo{font-size:56px;margin-bottom:.75rem;}
.login-title{font-size:28px;font-weight:700;margin-bottom:.35rem;}
.login-sub{font-size:16px;color:var(--tx2);margin-bottom:2.5rem;line-height:1.5;}
.login-btn{display:flex;align-items:center;gap:12px;padding:1rem 2rem;border-radius:var(--rl);border:.5px solid var(--bd2);background:var(--bg1);font-size:17px;font-weight:600;color:var(--tx1);cursor:pointer;font-family:inherit;}
.login-btn:active{box-shadow:0 0 0 3px var(--blue);}
.login-btn svg{width:24px;height:24px;}

/* User bar */
.user-bar{display:flex;align-items:center;gap:10px;padding:.5rem .75rem;border-radius:99px;background:var(--bg2);margin-bottom:.65rem;font-size:13px;color:var(--tx2);}
.user-bar img{width:28px;height:28px;border-radius:50%;}
.user-bar button{margin-left:auto;background:none;border:none;color:var(--tx3);font-size:12px;cursor:pointer;font-family:inherit;padding:4px 8px;}

/* Header + counts */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;margin-bottom:.5rem;}
.hdr-title{font-size:15px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;}
.hdr-title span{color:var(--green);margin-right:4px;}
.counts{display:flex;gap:12px;font-size:14px;font-weight:600;}
.cnt-new{color:var(--blue);}.cnt-learn{color:var(--red);}.cnt-rev{color:var(--green);}

/* Progress */
.pb-w{height:6px;background:var(--bg2);border-radius:99px;margin-bottom:1rem;overflow:hidden;}
.pb{height:100%;border-radius:99px;transition:width .4s;background:linear-gradient(90deg,var(--green),#5DCAA5);}

/* Diff */
.meta{display:flex;align-items:center;gap:6px;margin-bottom:.85rem;}
.pip{width:9px;height:9px;border-radius:50%;background:var(--bg3);}
.pip.g{background:var(--green);}.pip.a{background:var(--amber);}.pip.r{background:var(--red);}
.diff{font-size:13px;font-weight:600;}
.diff.easy{color:var(--green);}.diff.medium{color:var(--amber);}.diff.hard{color:var(--red);}
.mode-pill{margin-left:auto;font-size:11px;padding:4px 10px;border-radius:99px;border:.5px solid var(--bd2);color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;}

/* Card */
.card{border-radius:var(--rl);border:.5px solid var(--bd1);background:var(--bg1);padding:1.35rem;margin-bottom:.85rem;cursor:pointer;}
.card:active{box-shadow:0 0 0 2px var(--green);}
.tag{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem;}
.q{font-size:17px;font-weight:500;color:var(--tx1);line-height:1.6;}
.hint{font-size:13px;color:var(--tx3);margin-top:.85rem;}
.ans-label{font-size:11px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem;}
.ans{font-size:16px;color:var(--tx1);line-height:1.65;}
.detail{font-size:14px;color:var(--tx2);margin-top:.65rem;padding-top:.65rem;border-top:.5px solid var(--bd1);line-height:1.6;}
.diag{margin:.75rem 0;border-radius:var(--r);background:var(--bg2);padding:.85rem;overflow:hidden;}
.diag svg{display:block;width:100%;height:auto;}

/* Options */
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:.85rem;}
.opt{width:100%;text-align:left;padding:.85rem 1rem;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg1);font-size:15px;color:var(--tx1);cursor:pointer;line-height:1.45;font-family:inherit;}
.opt:active:not(:disabled){background:var(--bg2);}
.opt.ok{border-color:var(--green);background:var(--green-bg);color:var(--green-tx);}
.opt.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red-tx);}
.opt:disabled{cursor:default;}
.ol{font-weight:600;margin-right:8px;color:var(--tx3);}
.opt.ok .ol{color:var(--green);}.opt.wrong .ol{color:var(--red);}

/* Feedback */
.fb{border-radius:var(--r);padding:.85rem 1rem;font-size:14px;line-height:1.55;margin-bottom:.85rem;}
.fb-ok{background:var(--green-bg);color:var(--green-tx);border:.5px solid rgba(29,158,117,.3);}
.fb-err{background:var(--red-bg);color:var(--red-tx);border:.5px solid rgba(216,90,48,.3);}
.fb b{display:block;margin-bottom:4px;font-size:15px;}

/* SRS Buttons */
.srs-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:.85rem;}
.srs-btn{padding:.7rem .3rem;border-radius:var(--r);border:1px solid var(--bd2);background:var(--bg1);cursor:pointer;text-align:center;font-family:inherit;transition:background .1s;}
.srs-btn:active{transform:scale(.97);}
.srs-btn .srs-time{font-size:14px;font-weight:700;display:block;}
.srs-btn .srs-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-top:2px;display:block;}
.srs-btn.s-again{border-color:var(--red);color:var(--red);}.srs-btn.s-again:active{background:var(--red-bg);}
.srs-btn.s-hard{border-color:var(--amber);color:var(--amber);}.srs-btn.s-hard:active{background:#FFF3E0;}
.srs-btn.s-good{border-color:var(--green);color:var(--green);}.srs-btn.s-good:active{background:var(--green-bg);}
.srs-btn.s-easy{border-color:var(--blue);color:var(--blue);}.srs-btn.s-easy:active{background:#E6F1FB;}

/* AI */
.explain-btn{width:100%;padding:.85rem;border-radius:var(--r);border:.5px solid var(--purple);background:transparent;color:var(--purple);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:.85rem;display:flex;align-items:center;justify-content:center;gap:8px;}
.explain-btn:active{background:rgba(83,74,183,.1);}
.explain-btn:disabled{opacity:.6;cursor:wait;}
.ai-card{border-radius:var(--r);padding:1rem;background:var(--bg2);border:.5px solid var(--bd1);margin-bottom:.65rem;font-size:14px;color:var(--tx1);line-height:1.65;white-space:pre-wrap;}
.ai-card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.45rem;color:var(--blue);}
.ai-loading{text-align:center;padding:.8rem;color:var(--tx3);font-size:14px;}

/* Done / Empty */
.done{text-align:center;padding:3rem .75rem;}
.done-icon{font-size:56px;margin-bottom:1rem;}
.done-t{font-size:24px;font-weight:600;margin-bottom:.4rem;}
.done-s{font-size:16px;color:var(--tx2);line-height:1.5;margin-bottom:1.5rem;}
.acts{display:flex;gap:10px;margin-top:.5rem;}
.btn{flex:1;padding:.85rem 1rem;border-radius:var(--r);border:.5px solid var(--bd2);background:transparent;font-size:16px;color:var(--tx1);cursor:pointer;font-weight:600;font-family:inherit;}
.btn:active{background:var(--bg2);}
.btn-p{background:var(--tx1);color:var(--bg1);border-color:var(--tx1);}

/* Deck filter bar */
.deck-bar{display:flex;gap:6px;overflow-x:auto;padding:.5rem 0;margin-bottom:.75rem;-webkit-overflow-scrolling:touch;}
.deck-bar::-webkit-scrollbar{display:none;}
.deck-chip{white-space:nowrap;padding:6px 14px;border-radius:99px;border:1px solid var(--bd2);background:var(--bg1);font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;font-family:inherit;flex-shrink:0;}
.deck-chip.active{background:var(--tx1);color:var(--bg1);border-color:var(--tx1);}
.deck-chip .deck-count{font-size:11px;opacity:.7;margin-left:4px;}
</style>
</head>
<body>
<div class="app" id="app"><div class="login-screen"><div class="login-logo">&#9889;</div><div class="login-title">FlashMind</div><div class="login-sub">Carregando...</div></div></div>

import{getFirestore,doc,setDoc,getDoc,collection,getDocs,writeBatch}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fbApp=initializeApp({projectId:"flashmind-anki-ai",appId:"1:368064037355:web:0fefa2220d3a0037a659ae",apiKey:"AIzaSyDbfs7k7vcaaI-qCXRzY2RSo3IJcUspM1A",authDomain:"flashmind-anki-ai.firebaseapp.com",storageBucket:"flashmind-anki-ai.firebasestorage.app",messagingSenderId:"368064037355"});
const auth=getAuth(fbApp);const db=getFirestore(fbApp);

let currentUser=null;

// ══════════════════════════════════════════════

const CARDS=[
  {id:"c01",tag:"Tema 23 — Valvopatias Tricuspides",diff:"hard",deck:"Valvopatias::T23 Tricuspide",tags:["valvopatia","tricuspide","cortes-2d","ete"],question:"Em quais cortes a cuspide POSTERIOR da tricuspide e visualizada?",answer:"Bicaval modificado (ETE) e paraesternal via de entrada do VD posteriorizado",detail:"A cuspide posterior so aparece em cortes posteriorizados. No apical 4C padrao e subcostal convencional, veem-se apenas septal e anterior.",diagram:"tricuspide",options:["Apical 4C e subcostal 4C","Paraesternal eixo curto e subcostal 5C","Bicaval modificado (ETE) e paraesternal via de entrada VD posteriorizado","Apical 4C e paraesternal eixo longo VE"],correct:2},
  {id:"c02",tag:"Tema 04 — Janelas e Planos de Corte",diff:"medium",deck:"Principios::T04 Janelas e Planos",tags:["supraesternal","janelas","planos-corte"],question:"No corte supraesternal com index a 3h, qual estrutura e o numero 2?",answer:"Arteria pulmonar direita",detail:"Sequencia: 1=aorta transversa, 2=arteria pulmonar direita, 3=veia pulmonar superior direita, 4=veia pulmonar inferior esquerda.",diagram:"supraesternal",options:["Arteria pulmonar esquerda","Veia cava superior","Arteria pulmonar direita","Aorta ascendente"],correct:2},
  {id:"c03",tag:"Tema 05 — Quantificacao de Camaras",diff:"medium",deck:"Quantificacao::T05 Camaras",tags:["segmentacao","strain","gls","quantificacao"],question:"Qual modelo e padrao para perfusao miocardica e por que?",answer:"17 segmentos — uniformiza com RNM e cintilografia. O 18 segmentos e usado para strain (GLS).",detail:"O apex (seg. 17) nao tem vascularizacao coronaria definida, por isso e incluido na contratilidade mas excluido da perfusao nos modelos de cintilografia.",diagram:"segmentacao",options:["16 segmentos — padrao historico ASE","17 segmentos — uniformiza com RNM e cintilografia","18 segmentos — maior precisao de strain","20 segmentos — mais detalhado"],correct:1},
  {id:"c04",tag:"Tema 04 — Janelas e Planos de Corte",diff:"hard",deck:"Principios::T04 Janelas e Planos",tags:["seio-venoso","coronario","sulco-av","janelas"],question:"Em quais janelas transtoracicas o seio venoso coronario e identificado?",answer:"Paraesternal eixo longo VE, apical 2 camaras e apical 4 camaras posteriorizado",detail:"O seio venoso drena no AD (nao AE). Passa no sulco AV posterior ao anel mitral. Quando dilatado (ex.: ablacao, CRTD), fica mais evidente.",diagram:"seio_venoso",options:["Apical 4C, subcostal e paraesternal eixo curto","Paraesternal eixo longo VE, apical 2C e apical 4C posteriorizado","Supraesternal, bicaval e subcostal 5C","Via de entrada VD, apical 3C e subcostal"],correct:1},
  {id:"c05",tag:"Tema 12 — Hipertensao Pulmonar",diff:"easy",deck:"Hemodinamica::T12 HP",tags:["vci","pressao-ad","hemodinamica","hp"],question:"VCI=8mm ao final da expiracao, colapsabilidade >50%. PAD estimada e local de medicao?",answer:"PAD = 3 mmHg. Medir imediatamente abaixo da veia hepatica (0,5-3cm antes do AD)",detail:"Tabela: VCI<21+colapso>50% = 3mmHg; VCI<21+colapso<50% = 8mmHg; VCI>21+colapso>50% = 8mmHg; VCI>21+colapso<50% = 15mmHg.",diagram:"vci",options:["PAD=8mmHg, medir na desembocadura no AD","PAD=15mmHg, medir abaixo da veia hepatica","PAD=5mmHg, porcao distal da VCI","PAD=3mmHg, abaixo da veia hepatica"],correct:3},
  {id:"c06",tag:"Tema 06 — Funcao Sistolica VE",diff:"medium",deck:"Funcao::T06 Sistolica VE",tags:["feve","simpson","foreshortening"],question:"O que acontece com a FEVE no Simpson quando ha foreshortening (apical trucado)?",answer:"Superestima — VDF calculado e menor (denominador menor), elevando artificialmente a FEVE",detail:"FEVE=(VDF-VSF)/VDF. Apical trucado -> VDF subestimado -> denominador menor -> FEVE maior que a real.",diagram:"feve",options:["Subestima — excursao apical reduzida","Nao interfere — Simpson e robusto","Superestima — VDF menor eleva artificialmente a FEVE","Subestima — VSF fica artificialmente elevado"],correct:2},
  {id:"c07",tag:"Tema 06 — Funcao Sistolica VE",diff:"medium",deck:"Funcao::T06 Sistolica VE",tags:["feve","insuficiencia-mitral","regurgitacao"],question:"Por que a FEVE superestima a funcao sistolica na IM importante?",answer:"O volume regurgitante e computado como parte do stroke volume total, inflando o numerador",detail:"SV total = SV real (VSVE) + Vol. Regurgitante. O VR escapa para o AE durante a sistole mas e contado na FEVE como se fosse ejecao efetiva.",diagram:"feve",options:["Pos-carga reduzida aumenta VDF","Volume regurgitante infla o stroke volume total","IM subestima FEVE por reduzir enchimento","FEVE nao e afetada pela IM"],correct:1},
  {id:"c08",tag:"Tema 04 — Janelas e Planos de Corte",diff:"easy",deck:"Principios::T04 Janelas e Planos",tags:["vd","parede-anterior","paraesternal","janelas"],question:"A parede ANTERIOR do VD e vista em quais planos?",answer:"Paraesternal via de entrada VD + paraesternal eixo curto (vasos da base) + paraesternal eixo longo VE",detail:"No apical 4C e subcostal ve-se a parede lateral/livre e septal. A parede anterior so aparece nos cortes paraesternais.",diagram:"vd",options:["Apical 4C, apical VD focado e subcostal","Paraesternal via de entrada VD, eixo curto vasos da base e eixo longo VE","Subcostal, supraesternal e apical 2C","Paraesternal eixo longo VE, apical 4C e subcostal"],correct:1},

  {id:"c10",tag:"Tema 05 — Quantificacao de Camaras",diff:"easy",deck:"Quantificacao::T05 Camaras",tags:["crista-terminalis","eustaquio","chiari","variante-normal"],question:"O que e a crista terminalis e como diferencia-la da Valvula de Eustaquio e Rede de Chiari?",answer:"Proeminencia fibromuscular em C no AD (VCS->VCI pela parede lateral). Eustaquio: borda da VCI. Chiari: membranosa, fenestrada, associada a FOP.",detail:"A crista terminalis e uma estrutura solida, fibromuscular. Nao confundir com massas ou tumores — e uma variante normal e pode ser proeminente.",diagram:"ad",options:["Remanescente embriologico na borda da VCI","Membrana fenestrada associada a FOP","Proeminencia fibromuscular em C no AD da VCS ate VCI","Musculo papilar acessorio do VD"],correct:2}
];

const DG={
  tricuspide:(w,h)=>`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"><ellipse cx="${w/2}" cy="${h/2}" rx="${w*.38}" ry="${h*.38}" fill="var(--green-bg)" stroke="var(--green)" stroke-width="1.5"/><text x="${w/2}" y="${h*.18}" text-anchor="middle" font-size="10" fill="var(--green)" font-weight="500">Valvula Tricuspide</text><circle cx="${w*.32}" cy="${h*.38}" r="5" fill="var(--green)"/><text x="${w*.18}" y="${h*.34}" font-size="9" fill="var(--green-tx)">Anterior</text><circle cx="${w*.68}" cy="${h*.38}" r="5" fill="var(--amber)"/><text x="${w*.7}" y="${h*.34}" font-size="9" fill="var(--amber)">Posterior</text><circle cx="${w*.5}" cy="${h*.72}" r="5" fill="var(--purple)"/><text x="${w*.42}" y="${h*.85}" font-size="9" fill="var(--purple)">Septal</text></svg>`,

};
function svg(k){const fn=DG[k];return fn?`<div class="diag">${fn(300,90)}</div>`:''}

// ══════════════════════════════════════════════
// SRS ENGINE (FSRS — Free Spaced Repetition Scheduler)
// ══════════════════════════════════════════════
const SRS_DEFAULT={state:'new',stability:0,difficulty:0,due:0,reviews:0,lapses:0,lastReview:0};

const W=[0.4,0.6,2.4,5.8,4.93,0.94,0.86,0.01,1.49,0.14,0.94,2.18,0.05,0.34,1.26,0.29,2.61];
const DESIRED_R=0.9;
const DECAY=-0.5;
const FACTOR=19/81;

function clamp(v,lo,hi){return Math.min(Math.max(v,lo),hi);}

function fsrsInitD(rating){
  return clamp(W[4]-Math.exp(W[5]*(rating-1))+1,1,10);
}

function fsrsRetrievability(t,S){
  if(S<=0)return 0;
  return Math.pow(1+FACTOR*t/S,DECAY);
}

function fsrsNextInterval(S){
  if(S<=0)return 0;
  const ivl=(S/FACTOR)*(Math.pow(DESIRED_R,1/DECAY)-1);
  return Math.max(ivl,1/1440); // min 1 minute in days
}

function srsCalc(srs,rating){
  // rating: 1=Again, 2=Hard, 3=Good, 4=Easy
  const now=Date.now();
  let{stability:S,difficulty:D,reviews,lapses,lastReview}=srs;
  let newS,newD,newState,newLapses=lapses;

  if(srs.state==='new'||reviews===0){
    // First review — initial stability & difficulty
    newS=[W[0],W[1],W[2],W[3]][rating-1];
    newD=fsrsInitD(rating);
    newState=rating===1?'learning':'review';
    if(rating===1)newLapses++;
  }else{
    // Elapsed days since last review
    const elapsed=lastReview>0?((now-lastReview)/86400000):0;
    const R=fsrsRetrievability(elapsed,S);

    if(rating===1){
      // Failed — Again
      newS=W[11]*Math.pow(D,-W[12])*(Math.pow(S+1,W[13])-1)*Math.exp(W[14]*(1-R));
      newS=Math.max(newS,0.1);
      newLapses++;
      newState='relearning';
    }else{
      // Success — Hard/Good/Easy
      newS=S*(1+Math.exp(W[8])*(11-D)*Math.pow(S,-W[9])*(Math.exp(W[10]*(1-R))-1));
      newS=Math.max(newS,0.1);
      // Hard penalty / Easy bonus
      if(rating===2)newS=newS*0.85;
      else if(rating===4)newS=newS*1.15;
      newState='review';
    }

    // Difficulty update
    const D0_3=fsrsInitD(3);
    newD=D-W[6]*(rating-3);
    newD=W[7]*D0_3+(1-W[7])*newD;
    newD=clamp(newD,1,10);
  }

  // Cap stability at 365 (max interval ~365d)
  if(newS>365)newS=365;

  const interval=fsrsNextInterval(newS);
  const dueMs=now+interval*86400000;

  return{state:newState,stability:newS,difficulty:newD,due:dueMs,reviews:reviews+1,lapses:newLapses,lastReview:now};
}

function intervalLabel(srs,rating){
  const r=srsCalc(srs,rating);
  const d=fsrsNextInterval(r.stability);
  if(d<1/1440) return '<1m';
  if(d<1/24) return Math.round(d*1440)+'m';
  if(d<1) return Math.round(d*24)+'h';
  if(d<30) return Math.round(d)+'d';
  if(d<365) return Math.round(d/30)+'mo';
  return Math.round(d/365)+'a';
}

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let srsData={};// cardId -> srs object
let queue=[];// card ids to review this session
let qIdx=0;
let revealed=false;
let quizAnswered=false;
let quizSel=null;
let aiLoading=false;
let aiResult=null;
let sessionStats={ok:0,err:0};
let activeDeck=null;// null = all decks

// Deck helpers — extract 2nd level from "Eco::Anatomia::Tricuspide" => "Anatomia"
function getDeckL1(card){
  if(!card.deck)return 'Outros';
  return card.deck.split('::')[0];
}
function getDeckCounts(){
  const counts={};
  CARDS.forEach(c=>{const d=getDeckL1(c);counts[d]=(counts[d]||0)+1;});
  return counts;
}
function filteredCards(){
  if(!activeDeck)return CARDS;
  return CARDS.filter(c=>getDeckL1(c)===activeDeck);
}

// ══════════════════════════════════════════════
// FIRESTORE SRS SYNC
// ══════════════════════════════════════════════
async function loadSRS(){
  srsData={};
  if(!currentUser)return;
  try{
    const snap=await getDocs(collection(db,'users',currentUser.uid,'srs'));
    snap.forEach(d=>{srsData[d.id]=d.data();});
  }catch(e){console.warn('loadSRS:',e);}
  // Init missing cards
  CARDS.forEach(c=>{if(!srsData[c.id])srsData[c.id]={...SRS_DEFAULT};});
}

async function saveSRS(cardId,data){
  srsData[cardId]=data;
  if(!currentUser)return;
  try{await setDoc(doc(db,'users',currentUser.uid,'srs',cardId),data);}catch(e){console.warn('saveSRS:',e);}
}

function buildQueue(){
  const now=Date.now();
  const due=[];const newCards=[];
  const pool=filteredCards();
  pool.forEach(c=>{
    const s=srsData[c.id]||{...SRS_DEFAULT};
    if(s.state==='new'||s.reviews===0) newCards.push(c.id);
    else if(s.due<=now) due.push(c.id);
  });
  // Overdue first (sorted by oldest due), then new cards
  due.sort((a,b)=>(srsData[a].due||0)-(srsData[b].due||0));
  queue=[...due,...newCards];
  qIdx=0;
  sessionStats={ok:0,err:0};
}

function countCards(){
  const now=Date.now();let nw=0,learn=0,rev=0;
  const pool=filteredCards();
  pool.forEach(c=>{
    const s=srsData[c.id]||{...SRS_DEFAULT};
    if(s.state==='new'||s.reviews===0)nw++;
    else if(s.state==='relearning'||s.state==='learning')learn++;
    else if(s.due<=now)rev++;
  });
  return{nw,learn,rev};
}

// ══════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════
function showLogin(){
  const $=document.getElementById('app');
  $.innerHTML=`<div class="login-screen"><div class="login-logo">&#9889;</div><div class="login-title">FlashMind</div><div class="login-sub">Anki inteligente para prova DIC<br>Repeticao espacada + IA</div>
    <button class="login-btn" id="gL"><svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Entrar com Google</button></div>`;
  document.getElementById('gL').onclick=()=>{signInWithRedirect(auth,new GoogleAuthProvider());};
}

onAuthStateChanged(auth,async(user)=>{
  currentUser=user;
  if(user){await loadSRS();buildQueue();render();}
  else showLogin();
});

// ══════════════════════════════════════════════
// AI
// ══════════════════════════════════════════════
async function callExplain(){
  const card=CARDS.find(c=>c.id===queue[qIdx]);if(!card)return;
  aiLoading=true;aiResult=null;render();
  const wasCorrect=quizSel===null||quizSel===card.correct;
  const userAns=quizSel!==null?card.options[quizSel]:card.answer;
  try{
    const res=await fetch(FN_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:card.question,userAnswer:userAns,correctAnswer:card.answer,detail:card.detail,wasCorrect})});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();aiResult=data.explanation;
  }catch(e){console.error(e);aiResult='Erro ao conectar com a IA.';}
  aiLoading=false;render();
}

// ══════════════════════════════════════════════
// SRS RATE
// ══════════════════════════════════════════════
async function rate(rating){
  const cardId=queue[qIdx];
  const old=srsData[cardId]||{...SRS_DEFAULT};
  const updated=srsCalc(old,rating);
  await saveSRS(cardId,updated);
  if(rating>=3)sessionStats.ok++;else sessionStats.err++;
  revealed=false;quizAnswered=false;quizSel=null;aiLoading=false;aiResult=null;
  qIdx++;
  render();
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function render(){
  const $=document.getElementById('app');
  if(!currentUser){showLogin();return;}

  // Session done?
  if(qIdx>=queue.length){renderDone($);return;}

  const cardId=queue[qIdx];
  const card=CARDS.find(c=>c.id===cardId);
  const srs=srsData[cardId]||{...SRS_DEFAULT};
  const cnt=countCards();
  const pct=queue.length?Math.round(qIdx/queue.length*100):0;
  const di=card.diff==='easy'?{l:'Facil',c:'easy',p:'g'}:card.diff==='medium'?{l:'Medio',c:'medium',p:'a'}:{l:'Dificil',c:'hard',p:'r'};
  const pips=di.c==='easy'?1:di.c==='medium'?2:3;
  const isQuiz=qIdx%2!==0;

  const deckCounts=getDeckCounts();
  const deckNames=Object.keys(deckCounts).sort();
  const totalCards=CARDS.length;
  let deckChips=`<button class="deck-chip${activeDeck===null?' active':''}" data-deck="__all__">Todos<span class="deck-count">${totalCards}</span></button>`;
  deckNames.forEach(dk=>{deckChips+=`<button class="deck-chip${activeDeck===dk?' active':''}" data-deck="${dk}">${dk}<span class="deck-count">${deckCounts[dk]}</span></button>`;});

  $.innerHTML=`
    <div class="user-bar"><img src="${currentUser.photoURL||''}" alt="" referrerpolicy="no-referrer"/><span>${currentUser.displayName||''}</span><button id="lo">Sair</button></div>
    <div class="hdr">
      <div class="hdr-title"><span>FM</span>Anki DIC</div>
      <div class="counts"><span class="cnt-new">${cnt.nw} novos</span><span class="cnt-learn">${cnt.learn} aprend.</span><span class="cnt-rev">${cnt.rev} revis.</span></div>
    </div>
    <div class="deck-bar" id="deckBar">${deckChips}</div>
    <div class="pb-w"><div class="pb" style="width:${pct}%"></div></div>
    <div class="meta">${Array(pips).fill(`<div class="pip ${di.p}"></div>`).join('')}<span class="diff ${di.c}">${di.l}</span><span class="mode-pill">${isQuiz?'Quiz':'Flip'}</span></div>`;
  document.getElementById('lo').onclick=()=>signOut(auth);
  // Deck chip click handlers
  document.querySelectorAll('.deck-chip').forEach(chip=>{
    chip.onclick=()=>{
      const dk=chip.getAttribute('data-deck');
      activeDeck=dk==='__all__'?null:dk;
      buildQueue();render();
    };
  });

  if(isQuiz) renderQuiz($,card,srs);
  else renderFlip($,card,srs);
}

function renderFlip($,card,srs){
  if(!revealed){
    const w=document.createElement('div');
    w.innerHTML=`<div class="card" id="fc"><div class="tag">${card.tag}</div><div class="q">${card.question}</div><div class="hint">Toque para revelar</div></div>`;
    $.appendChild(w);
    document.getElementById('fc').onclick=()=>{revealed=true;render();};
  }else{
    const w=document.createElement('div');
    w.innerHTML=`<div class="card" style="cursor:default"><div class="ans-label">Resposta</div><div class="ans">${card.answer}</div>${svg(card.diagram)}<div class="detail">${card.detail}</div></div>`;
    $.appendChild(w);
    addAI($);
    addSRSButtons($,srs);
  }
}

function renderQuiz($,card,srs){
  const qd=document.createElement('div');qd.className='card';qd.style.cursor='default';
  qd.innerHTML=`<div class="tag">${card.tag}</div><div class="q">${card.question}</div>`;
  if(quizAnswered)qd.innerHTML+=svg(card.diagram);
  $.appendChild(qd);

  const opts=document.createElement('div');opts.className='opts';
  ['A','B','C','D'].forEach((l,i)=>{
    const b=document.createElement('button');b.className='opt';b.disabled=quizAnswered;
    if(quizAnswered){if(i===card.correct)b.classList.add('ok');else if(i===quizSel)b.classList.add('wrong');}
    b.innerHTML=`<span class="ol">${l}.</span>${card.options[i]}`;
    if(!quizAnswered)b.onclick=()=>{quizSel=i;quizAnswered=true;render();};
    opts.appendChild(b);
  });
  $.appendChild(opts);

  if(quizAnswered){
    const ok=quizSel===card.correct;
    const fb=document.createElement('div');fb.className=`fb ${ok?'fb-ok':'fb-err'}`;
    fb.innerHTML=`<b>${ok?'Correto!':'Incorreto'}</b>${card.detail}`;
    $.appendChild(fb);
    addAI($);
    addSRSButtons($,srs);
  }
}

function addSRSButtons($,srs){
  const row=document.createElement('div');row.className='srs-row';
  [{r:1,cls:'s-again',lbl:'Denovo'},{r:2,cls:'s-hard',lbl:'Dificil'},{r:3,cls:'s-good',lbl:'Bom'},{r:4,cls:'s-easy',lbl:'Facil'}].forEach(({r,cls,lbl})=>{
    const b=document.createElement('button');b.className=`srs-btn ${cls}`;
    b.innerHTML=`<span class="srs-time">${intervalLabel(srs,r)}</span><span class="srs-label">${lbl}</span>`;
    b.onclick=()=>rate(r);
    row.appendChild(b);
  });
  $.appendChild(row);
}

function addAI($){
  if(aiLoading){
    const ld=document.createElement('div');ld.className='ai-loading';ld.textContent='⚡ Gerando explicacao...';$.appendChild(ld);return;
  }
  if(aiResult){
    const box=document.createElement('div');box.className='ai-card';
    box.innerHTML=`<div class="ai-card-title">⚡ Explicacao IA</div><div>${aiResult}</div>`;
    $.appendChild(box);
  }
  const eb=document.createElement('button');eb.className='explain-btn';eb.disabled=aiLoading;
  eb.textContent=aiResult?'Perguntar de novo':'⚡ Explicar com IA';
  eb.onclick=callExplain;$.appendChild(eb);
}

function renderDone($){
  const cnt=countCards();const total=sessionStats.ok+sessionStats.err;
  const pct=total?Math.round(sessionStats.ok/total*100):0;
  $.innerHTML=`
    <div class="user-bar"><img src="${currentUser.photoURL||''}" alt="" referrerpolicy="no-referrer"/><span>${currentUser.displayName||''}</span><button id="lo2">Sair</button></div>
    <div class="done">
      <div class="done-icon">${queue.length===0?'&#128564;':'&#127919;'}</div>
      <div class="done-t">${queue.length===0?'Nenhum card para revisar!':total?`${pct}% de acerto`:'Sessao concluida!'}</div>
      <div class="done-s">${queue.length===0?'Volte mais tarde — a repeticao espacada esta trabalhando por voce.':`Acertou ${sessionStats.ok} de ${total} cards`}<br>
        Pendentes: ${cnt.nw} novos, ${cnt.learn} aprendendo, ${cnt.rev} revisao</div>
      <div class="acts" style="max-width:320px;margin:0 auto;">
        <button class="btn btn-p" id="bR">${queue.length===0?'Estudar todos':'Revisar de novo'}</button>
      </div>
    </div>`;
  document.getElementById('lo2').onclick=()=>signOut(auth);
  document.getElementById('bR').onclick=()=>{
    if(queue.length===0){
      // Reset: study all cards (filtered) as new session
      queue=filteredCards().map(c=>c.id);
    }
    qIdx=0;sessionStats={ok:0,err:0};revealed=false;quizAnswered=false;quizSel=null;aiResult=null;render();
  };
}
</script>
