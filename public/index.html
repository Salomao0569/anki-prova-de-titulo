<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#141412"/>
<title>FlashMind — Anki DIC</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100dvh;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg1:#ffffff;--bg2:#f0efe9;--bg3:#e8e7e2;
  --tx1:#1a1a1a;--tx2:#6b6b68;--tx3:#9b9b98;
  --bd1:rgba(0,0,0,0.12);--bd2:rgba(0,0,0,0.22);
  --green:#1D9E75;--green-bg:#E1F5EE;--green-tx:#085041;
  --red:#D85A30;--red-bg:#FAECE7;--red-tx:#4A1B0C;
  --amber:#BA7517;--blue:#378ADD;--purple:#534AB7;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg1:#1e1e1c;--bg2:#2a2a28;--bg3:#333331;
    --tx1:#f0efe9;--tx2:#a0a09c;--tx3:#6b6b68;
    --bd1:rgba(255,255,255,0.1);--bd2:rgba(255,255,255,0.18);
    --green-bg:#0d3328;--green-tx:#5DCAA5;
    --red-bg:#3a1a0e;--red-tx:#F5A88A;
  }
  body{background:#141412;color:#f0efe9;}
}
.app{max-width:600px;margin:0 auto;padding:1rem 1rem 2rem;min-height:100dvh;}

/* Login */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80dvh;text-align:center;padding:2rem;}
.login-logo{font-size:42px;margin-bottom:.5rem;}
.login-title{font-size:22px;font-weight:700;margin-bottom:.25rem;color:var(--tx1);}
.login-sub{font-size:13px;color:var(--tx2);margin-bottom:2rem;line-height:1.5;}
.login-btn{display:flex;align-items:center;gap:10px;padding:.7rem 1.5rem;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg1);font-size:14px;font-weight:600;color:var(--tx1);cursor:pointer;font-family:inherit;transition:box-shadow .15s;}
.login-btn:active{box-shadow:0 0 0 2px var(--blue);}
.login-btn svg{width:20px;height:20px;}
.user-bar{display:flex;align-items:center;gap:8px;padding:.4rem .6rem;border-radius:99px;background:var(--bg2);margin-bottom:.5rem;font-size:11px;color:var(--tx2);}
.user-bar img{width:22px;height:22px;border-radius:50%;}
.user-bar button{margin-left:auto;background:none;border:none;color:var(--tx3);font-size:10px;cursor:pointer;font-family:inherit;}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;margin-bottom:.5rem;}
.hdr-title{font-size:13px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;}
.hdr-title span{color:var(--green);margin-right:4px;}
.streak-pill{display:flex;align-items:center;gap:4px;background:var(--bg2);border-radius:99px;padding:4px 10px;font-size:12px;font-weight:600;color:var(--amber);}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:.75rem;}
.st{background:var(--bg2);border-radius:var(--r);padding:.5rem .4rem;text-align:center;}
.st-n{font-size:17px;font-weight:600;}.st-l{font-size:9px;color:var(--tx3);margin-top:1px;text-transform:uppercase;letter-spacing:.04em;}
.st-ok .st-n{color:var(--green);}.st-err .st-n{color:var(--red);}.st-str .st-n{color:var(--amber);}
.pb-w{height:4px;background:var(--bg2);border-radius:99px;margin-bottom:.75rem;overflow:hidden;}
.pb{height:100%;border-radius:99px;transition:width .4s;background:linear-gradient(90deg,var(--green),#5DCAA5);}
.meta{display:flex;align-items:center;gap:5px;margin-bottom:.65rem;}
.pip{width:7px;height:7px;border-radius:50%;background:var(--bg3);}
.pip.g{background:var(--green);}.pip.a{background:var(--amber);}.pip.r{background:var(--red);}
.diff{font-size:10px;font-weight:600;}
.diff.easy{color:var(--green);}.diff.medium{color:var(--amber);}.diff.hard{color:var(--red);}
.mode-pill{margin-left:auto;font-size:9px;padding:2px 8px;border-radius:99px;border:.5px solid var(--bd2);color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;}

/* Card */
.card{border-radius:var(--rl);border:.5px solid var(--bd1);background:var(--bg1);padding:1.1rem;margin-bottom:.65rem;cursor:pointer;transition:box-shadow .15s;}
.card:active{box-shadow:0 0 0 2px var(--green);}
.tag{font-size:9px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;}
.q{font-size:14.5px;font-weight:500;color:var(--tx1);line-height:1.55;}
.hint{font-size:10px;color:var(--tx3);margin-top:.65rem;}
.ans-label{font-size:9px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;}
.ans{font-size:13.5px;color:var(--tx1);line-height:1.6;}
.detail{font-size:11.5px;color:var(--tx2);margin-top:.5rem;padding-top:.5rem;border-top:.5px solid var(--bd1);line-height:1.55;}
.diag{margin:.5rem 0;border-radius:var(--r);background:var(--bg2);padding:.6rem;overflow:hidden;}
.diag svg{display:block;width:100%;height:auto;}

/* Options */
.opts{display:flex;flex-direction:column;gap:6px;margin-bottom:.65rem;}
.opt{width:100%;text-align:left;padding:.6rem .8rem;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg1);font-size:12.5px;color:var(--tx1);cursor:pointer;line-height:1.4;transition:background .1s;font-family:inherit;}
.opt:active:not(:disabled){background:var(--bg2);}
.opt.ok{border-color:var(--green);background:var(--green-bg);color:var(--green-tx);}
.opt.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red-tx);}
.opt:disabled{cursor:default;}
.ol{font-weight:600;margin-right:6px;color:var(--tx3);}
.opt.ok .ol{color:var(--green);}.opt.wrong .ol{color:var(--red);}

/* Feedback */
.fb{border-radius:var(--r);padding:.6rem .8rem;font-size:11.5px;line-height:1.5;margin-bottom:.65rem;}
.fb-ok{background:var(--green-bg);color:var(--green-tx);border:.5px solid rgba(29,158,117,.3);}
.fb-err{background:var(--red-bg);color:var(--red-tx);border:.5px solid rgba(216,90,48,.3);}
.fb b{display:block;margin-bottom:2px;}

/* AI Agents */
.ai-section{margin-bottom:.65rem;}
.explain-btn{width:100%;padding:.6rem;border-radius:var(--r);border:.5px solid var(--purple);background:transparent;color:var(--purple);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:.65rem;transition:background .12s;display:flex;align-items:center;justify-content:center;gap:6px;}
.explain-btn:active{background:rgba(83,74,183,.1);}
.explain-btn:disabled{opacity:.6;cursor:wait;}
.ai-card{border-radius:var(--r);padding:.7rem;background:var(--bg2);border:.5px solid var(--bd1);margin-bottom:.5rem;font-size:12px;color:var(--tx1);line-height:1.6;}
.ai-card-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.35rem;display:flex;align-items:center;gap:5px;}
.ai-card-title.t-exp{color:var(--blue);}
.ai-card-title.t-deep{color:var(--green);}
.ai-card-title.t-mnem{color:var(--purple);}
.ai-card-body{white-space:pre-wrap;}
.ai-loading{text-align:center;padding:.8rem;color:var(--tx3);font-size:12px;}
.ai-loading .dots{display:inline-block;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:.3;}50%{opacity:1;}}

/* Actions */
.acts{display:flex;gap:7px;}
.btn{flex:1;padding:.55rem .8rem;border-radius:var(--r);border:.5px solid var(--bd2);background:transparent;font-size:12.5px;color:var(--tx1);cursor:pointer;font-weight:600;font-family:inherit;transition:background .12s;}
.btn:active{background:var(--bg2);}
.btn-p{background:var(--tx1);color:var(--bg1);border-color:var(--tx1);}
.btn-ok{border-color:var(--green);color:var(--green);}.btn-ok:active{background:var(--green-bg);}
.btn-err{border-color:var(--red);color:var(--red);}.btn-err:active{background:var(--red-bg);}

/* Done */
.done{text-align:center;padding:2.5rem .5rem;}
.done-icon{font-size:48px;margin-bottom:.75rem;}
.done-t{font-size:19px;font-weight:600;margin-bottom:.3rem;}
.done-s{font-size:13px;color:var(--tx2);line-height:1.5;margin-bottom:1.25rem;}
</style>
</head>

   answer:"Bicaval modificado (ETE) e paraesternal via de entrada do VD posteriorizado",

  seio_venoso:(w,h)=>`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"><ellipse cx="${w*.38}" cy="${h*.45}" rx="${w*.28}" ry="${h*.35}" fill="#EEEDFE" stroke="var(--purple)" stroke-width="1.5"/><text x="${w*.38}" y="${h*.42}" text-anchor="middle" font-size="9" fill="var(--purple)">AE</text><ellipse cx="${w*.62}" cy="${h*.45}" rx="${w*.22}" ry="${h*.28}" fill="#E6F1FB" stroke="var(--blue)" stroke-width="1.5"/><text x="${w*.62}" y="${h*.42}" text-anchor="middle" font-size="9" fill="#0C447C">AD</text><path d="M${w*.18} ${h*.62} Q${w*.38} ${h*.78} ${w*.62} ${h*.65}" fill="none" stroke="var(--red)" stroke-width="2.5"/><circle cx="${w*.62}" cy="${h*.65}" r="4" fill="var(--red)"/><text x="${w*.5}" y="${h*.9}" text-anchor="middle" font-size="9" fill="var(--red-tx)" font-weight="500">Seio Venoso drena no AD</text></svg>`,
  vci:(w,h)=>`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"><rect x="${w*.4}" y="${h*.05}" width="${w*.2}" height="${h*.3}" rx="4" fill="#E6F1FB" stroke="var(--blue)" stroke-width="1.5"/><text x="${w*.5}" y="${h*.22}" text-anchor="middle" font-size="9" fill="#0C447C">AD</text><rect x="${w*.43}" y="${h*.35}" width="${w*.14}" height="${h*.55}" rx="3" fill="var(--red-bg)" stroke="var(--red)" stroke-width="1.5"/><text x="${w*.5}" y="${h*.65}" text-anchor="middle" font-size="9" fill="var(--red-tx)">VCI</text><line x1="${w*.25}" y1="${h*.5}" x2="${w*.43}" y2="${h*.5}" stroke="var(--green)" stroke-width="1.5" stroke-dasharray="3,2"/><circle cx="${w*.43}" cy="${h*.5}" r="4" fill="var(--green)"/><text x="${w*.22}" y="${h*.46}" font-size="9" fill="var(--green-tx)">V.Hepatica</text><text x="${w*.5}" y="${h*.97}" text-anchor="middle" font-size="8" fill="var(--tx3)">Medir abaixo da hepatica (0,5-3cm)</text></svg>`,
  feve:(w,h)=>`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"><rect x="${w*.05}" y="${h*.08}" width="${w*.9}" height="${h*.32}" rx="6" fill="var(--green-bg)" stroke="var(--green)" stroke-width="1"/><text x="${w*.5}" y="${h*.2}" text-anchor="middle" font-size="10" fill="var(--green-tx)" font-weight="500">FEVE = (VDF - VSF) / VDF</text><text x="${w*.5}" y="${h*.32}" text-anchor="middle" font-size="9" fill="var(--green)">Numerador: Stroke Volume</text><rect x="${w*.05}" y="${h*.48}" width="${w*.43}" height="${h*.38}" rx="5" fill="var(--red-bg)" stroke="var(--red)" stroke-width="1"/><text x="${w*.265}" y="${h*.62}" text-anchor="middle" font-size="9" fill="var(--red-tx)" font-weight="500">Foreshortening</text><text x="${w*.265}" y="${h*.78}" text-anchor="middle" font-size="8" fill="var(--red)">VDF menor = FEVE maior</text><rect x="${w*.52}" y="${h*.48}" width="${w*.43}" height="${h*.38}" rx="5" fill="var(--red-bg)" stroke="var(--red)" stroke-width="1"/><text x="${w*.735}" y="${h*.62}" text-anchor="middle" font-size="9" fill="var(--red-tx)" font-weight="500">Insuf. Mitral</text><text x="${w*.735}" y="${h*.78}" text-anchor="middle" font-size="8" fill="var(--red)">VR infla SV = FEVE maior</text></svg>`,
  vd:(w,h)=>`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"><text x="${w*.5}" y="${h*.1}" text-anchor="middle" font-size="10" fill="var(--tx3)" font-weight="500">Parede Anterior do VD</text><rect x="${w*.05}" y="${h*.18}" width="${w*.28}" height="${h*.28}" rx="4" fill="var(--green-bg)" stroke="var(--green)" stroke-width="1"/><text x="${w*.19}" y="${h*.34}" text-anchor="middle" font-size="8" fill="var(--green-tx)">Via entrada VD</text><rect x="${w*.37}" y="${h*.18}" width="${w*.28}" height="${h*.28}" rx="4" fill="var(--green-bg)" stroke="var(--green)" stroke-width="1"/><text x="${w*.51}" y="${h*.34}" text-anchor="middle" font-size="8" fill="var(--green-tx)">Eixo curto</text><rect x="${w*.69}" y="${h*.18}" width="${w*.27}" height="${h*.28}" rx="4" fill="var(--green-bg)" stroke="var(--green)" stroke-width="1"/><text x="${w*.825}" y="${h*.34}" text-anchor="middle" font-size="8" fill="var(--green-tx)">Eixo longo</text><rect x="${w*.2}" y="${h*.58}" width="${w*.28}" height="${h*.28}" rx="4" fill="var(--red-bg)" stroke="var(--red)" stroke-width="1"/><text x="${w*.34}" y="${h*.74}" text-anchor="middle" font-size="8" fill="var(--red-tx)">Apical 4C</text><rect x="${w*.52}" y="${h*.58}" width="${w*.28}" height="${h*.28}" rx="4" fill="var(--red-bg)" stroke="var(--red)" stroke-width="1"/><text x="${w*.66}" y="${h*.74}" text-anchor="middle" font-size="8" fill="var(--red-tx)">Subcostal</text></svg>`,
  aorta:(w,h)=>`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"><rect x="${w*.05}" y="${h*.05}" width="${w*.43}" height="${h*.55}" rx="5" fill="var(--red-bg)" stroke="var(--red)" stroke-width="1"/><text x="${w*.265}" y="${h*.2}" text-anchor="middle" font-size="9" fill="var(--red-tx)" font-weight="500">Anel Aortico</text><text x="${w*.265}" y="${h*.35}" text-anchor="middle" font-size="8" fill="var(--red)">Mesossistole</text><text x="${w*.265}" y="${h*.48}" text-anchor="middle" font-size="8" fill="var(--red)">Inner-Inner</text><rect x="${w*.52}" y="${h*.05}" width="${w*.43}" height="${h*.55}" rx="5" fill="var(--green-bg)" stroke="var(--green)" stroke-width="1"/><text x="${w*.735}" y="${h*.2}" text-anchor="middle" font-size="9" fill="var(--green-tx)" font-weight="500">Seios + JST + Asc</text><text x="${w*.735}" y="${h*.35}" text-anchor="middle" font-size="8" fill="var(--green)">Telediastole</text><text x="${w*.735}" y="${h*.48}" text-anchor="middle" font-size="8" fill="var(--green)">Leading Edge-LE</text></svg>`,
  ad:(w,h)=>`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"><ellipse cx="${w*.5}" cy="${h*.48}" rx="${w*.38}" ry="${h*.4}" fill="#E6F1FB" stroke="var(--blue)" stroke-width="1.5"/><text x="${w*.5}" y="${h*.22}" text-anchor="middle" font-size="10" fill="#0C447C">Atrio Direito</text><path d="M${w*.5} ${h*.1} Q${w*.85} ${h*.48} ${w*.5} ${h*.85}" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-dasharray="4,2"/><text x="${w*.78}" y="${h*.55}" text-anchor="middle" font-size="8" fill="var(--green-tx)" font-weight="500">Crista terminalis</text><circle cx="${w*.5}" cy="${h*.82}" r="5" fill="var(--red)"/><text x="${w*.5}" y="${h*.97}" text-anchor="middle" font-size="8" fill="var(--red-tx)">VCI = Eustaquio</text><circle cx="${w*.5}" cy="${h*.12}" r="5" fill="var(--purple)"/><text x="${w*.35}" y="${h*.08}" text-anchor="middle" font-size="8" fill="var(--purple)">VCS</text></svg>`
};
function svg(k){const fn=DG[k];return fn?`<div class="diag">${fn(300,95)}</div>`:''}

// ── STATE ──
let cards=CARDS,mode='flip',idx=0,order=[],answered=false,sel=null,
    score={ok:0,err:0},streak=0,flipped=false,done=false,
    aiLoading=false,aiResult=null;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function resetGame(){order=shuffle([...Array(cards.length).keys()]);idx=0;score={ok:0,err:0};streak=0;answered=false;sel=null;done=false;flipped=false;aiLoading=false;aiResult=null;mode='flip';render();}
function cc(){return cards[order[idx]];}
function di(d){return d==='easy'?{l:'Facil',c:'easy',p:'g'}:d==='medium'?{l:'Medio',c:'medium',p:'a'}:{l:'Dificil',c:'hard',p:'r'};}

// ── AUTH ──
function showLogin(){
  const $=document.getElementById('app');
  $.innerHTML=`
    <div class="login-screen">
      <div class="login-logo">&#9889;</div>
      <div class="login-title">FlashMind</div>
      <div class="login-sub">Anki inteligente para prova DIC<br>Ecocardiografia 2026</div>
      <button class="login-btn" id="gLogin">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Entrar com Google
      </button>
    </div>`;
  document.getElementById('gLogin').onclick=async()=>{
    try{await signInWithPopup(auth,new GoogleAuthProvider());}catch(e){console.error(e);}
  };
}

onAuthStateChanged(auth,(user)=>{
  currentUser=user;
  if(user){resetGame();}else{showLogin();}
});

// ── AI AGENT SWARM ──
async function callAgents(){
  const card=cc();
  aiLoading=true;aiResult=null;render();
  const wasCorrect=mode==='flip'?true:(sel===card.correct);
  const userAns=mode==='quiz'&&sel!==null?card.options[sel]:card.answer;
  const optMap={};
  ['A','B','C','D'].forEach((l,i)=>{optMap[l]=card.options[i];});
  try{
    const res=await fetch(FN_URL,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:card.question,userAnswer:userAns,correctAnswer:card.answer,detail:card.detail,wasCorrect,options:optMap})
    });
    if(!res.ok)throw new Error('HTTP '+res.status);
    aiResult=await res.json();
  }catch(e){
    console.error(e);
    aiResult={explicacao:'Erro ao conectar com a IA. Tente novamente.',aprofundamento:'',mnemonico:''};
  }
  aiLoading=false;render();
}

// ── RENDER ──
function render(){
  const $=document.getElementById('app');
  if(!currentUser){showLogin();return;}
  if(done){renderDone($);return;}
  const card=cc(),d=di(card.diff),pct=Math.round(idx/cards.length*100);
  const pips=d.c==='easy'?1:d.c==='medium'?2:3;
  let h=`
    <div class="user-bar">
      <img src="${currentUser.photoURL||''}" alt="" referrerpolicy="no-referrer"/>
      <span>${currentUser.displayName||currentUser.email}</span>
      <button id="logout">Sair</button>
    </div>
    <div class="hdr"><div class="hdr-title"><span>FM</span>Anki DIC</div><div class="streak-pill">&#128293; ${streak}</div></div>
    <div class="stats">
      <div class="st st-ok"><div class="st-n">${score.ok}</div><div class="st-l">Acertos</div></div>
      <div class="st st-err"><div class="st-n">${score.err}</div><div class="st-l">Erros</div></div>
      <div class="st st-str"><div class="st-n">${streak}</div><div class="st-l">Streak</div></div>
      <div class="st"><div class="st-n">${cards.length-idx}</div><div class="st-l">Restam</div></div>
    </div>
    <div class="pb-w"><div class="pb" style="width:${pct}%"></div></div>
    <div class="meta">${Array(pips).fill(`<div class="pip ${d.p}"></div>`).join('')}<span class="diff ${d.c}">${d.l}</span><span class="mode-pill">${mode==='flip'?'Flip':'Quiz'}</span></div>`;
  $.innerHTML=h;
  document.getElementById('logout').onclick=()=>signOut(auth);
  if(mode==='flip')renderFlip($,card);else renderQuiz($,card);
}

function renderFlip($,card){
  if(!flipped){
    const w=document.createElement('div');
    w.innerHTML=`<div class="card" id="fc"><div class="tag">${card.tag}</div><div class="q">${card.question}</div><div class="hint">Toque para revelar</div></div>`;
    $.appendChild(w);
    document.getElementById('fc').onclick=()=>{flipped=true;render();};
  }else{
    const w=document.createElement('div');
    w.innerHTML=`<div class="card" style="cursor:default"><div class="ans-label">Resposta</div><div class="ans">${card.answer}</div>${svg(card.diagram)}<div class="detail">${card.detail}</div></div>`;
    $.appendChild(w);
    addAI($);
    const a=document.createElement('div');a.className='acts';
    a.innerHTML=`<button class="btn btn-err" id="bE">Errei</button><button class="btn btn-ok" id="bO">Acertei</button>`;
    $.appendChild(a);
    document.getElementById('bE').onclick=()=>{score.err++;streak=0;flipped=false;aiResult=null;advance();};
    document.getElementById('bO').onclick=()=>{score.ok++;streak++;flipped=false;aiResult=null;advance();};
  }
}

function renderQuiz($,card){
  const qd=document.createElement('div');qd.className='card';qd.style.cursor='default';
  qd.innerHTML=`<div class="tag">${card.tag}</div><div class="q">${card.question}</div>`;
  if(answered)qd.innerHTML+=svg(card.diagram);
  $.appendChild(qd);
  const opts=document.createElement('div');opts.className='opts';
  ['A','B','C','D'].forEach((l,i)=>{
    const b=document.createElement('button');b.className='opt';b.disabled=answered;
    if(answered){if(i===card.correct)b.classList.add('ok');else if(i===sel)b.classList.add('wrong');}
    b.innerHTML=`<span class="ol">${l}.</span>${card.options[i]}`;
    if(!answered)b.onclick=()=>{sel=i;answered=true;if(i===card.correct){score.ok++;streak++;}else{score.err++;streak=0;}render();};
    opts.appendChild(b);
  });
  $.appendChild(opts);
  if(answered){
    const ok=sel===card.correct;
    const fb=document.createElement('div');fb.className=`fb ${ok?'fb-ok':'fb-err'}`;
    fb.innerHTML=`<b>${ok?'Correto!':'Incorreto'}</b>${card.detail}`;
    $.appendChild(fb);
    addAI($);
    const a=document.createElement('div');a.className='acts';
    a.innerHTML=`<button class="btn btn-p" id="bN">Proximo</button>`;
    $.appendChild(a);
    document.getElementById('bN').onclick=()=>{answered=false;sel=null;aiResult=null;advance();};
  }
}

function addAI($){
  const sec=document.createElement('div');sec.className='ai-section';

  if(aiLoading){
    sec.innerHTML=`<div class="ai-loading"><span class="dots">&#9889; Agentes analisando a questao...</span></div>`;
    $.appendChild(sec);return;
  }

  if(aiResult){
    if(aiResult.explicacao){
      sec.innerHTML+=`<div class="ai-card"><div class="ai-card-title t-exp">&#128218; Explicador</div><div class="ai-card-body">${aiResult.explicacao}</div></div>`;
    }
    if(aiResult.aprofundamento){
      sec.innerHTML+=`<div class="ai-card"><div class="ai-card-title t-deep">&#127793; Aprofundamento</div><div class="ai-card-body">${aiResult.aprofundamento}</div></div>`;
    }
    if(aiResult.mnemonico){
      sec.innerHTML+=`<div class="ai-card"><div class="ai-card-title t-mnem">&#129504; Mnemonico</div><div class="ai-card-body">${aiResult.mnemonico}</div></div>`;
    }
    $.appendChild(sec);
    const rb=document.createElement('button');rb.className='explain-btn';rb.textContent='Perguntar de novo';
    rb.onclick=callAgents;$.appendChild(rb);
  }else{
    const eb=document.createElement('button');eb.className='explain-btn';
    eb.innerHTML='&#9889; Explicar com IA (3 agentes)';
    eb.onclick=callAgents;$.appendChild(eb);
  }
}

function advance(){idx++;if(idx>=cards.length){done=true;saveProgress();render();return;}mode=idx%2===0?'flip':'quiz';render();}

function renderDone($){
  const pct=Math.round(score.ok/cards.length*100);
  const e=pct>=80?'&#127919;':pct>=60?'&#128200;':'&#128170;';
  const m=pct>=80?'Excelente!':pct>=60?'Bom progresso!':'Continue estudando!';
  $.innerHTML=`<div class="done"><div class="done-icon">${e}</div><div class="done-t">${m}</div>
    <div class="done-s">Acertou ${score.ok} de ${cards.length} (${pct}%)</div>
    <div class="stats" style="max-width:260px;margin:0 auto 1rem;">
      <div class="st st-ok"><div class="st-n">${score.ok}</div><div class="st-l">Acertos</div></div>
      <div class="st st-err"><div class="st-n">${score.err}</div><div class="st-l">Erros</div></div>
    </div>
    <div class="acts" style="max-width:280px;margin:0 auto;"><button class="btn btn-p" id="bR">Refazer</button></div></div>`;
  document.getElementById('bR').onclick=resetGame;
}

async function saveProgress(){
  if(!currentUser)return;
  try{
    await setDoc(doc(db,'progress',currentUser.uid),{
      displayName:currentUser.displayName,email:currentUser.email,
      correct:score.ok,wrong:score.err,total:cards.length,
      pct:Math.round(score.ok/cards.length*100),streak,
      ts:new Date().toISOString()
    },{merge:true});
  }catch(e){console.warn('Firestore:',e);}
}
</script>
</body>
</html>
